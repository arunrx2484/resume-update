name: Naukri Resume Update (Self-Hosted)

on:
  workflow_dispatch:
  # Enable if you want GitHub to trigger on this machine's runner schedule.
  # schedule:
  #   - cron: "30 18 * * *" # 12:00 AM IST
  #   - cron: "30 21 * * *" # 03:00 AM IST
  #   - cron: "30 0 * * *"  # 06:00 AM IST
  #   - cron: "30 3 * * *"  # 09:00 AM IST
  #   - cron: "30 6 * * *"  # 12:00 PM IST
  #   - cron: "30 9 * * *"  # 03:00 PM IST
  #   - cron: "30 12 * * *" # 06:00 PM IST
  #   - cron: "30 15 * * *" # 09:00 PM IST

jobs:
  run-naukri-bdd-self-hosted:
    runs-on: [self-hosted, macOS]
    timeout-minutes: 30
    env:
      ENV: qa
      BROWSER: chromium
      HEADLESS: true
      NAUKRI_FORCE_DIRECT_LOGIN: "false"
      NAUKRI_USER: ${{ secrets.NAUKRI_USER }}
      NAUKRI_PASS: ${{ secrets.NAUKRI_PASS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Prepare resume file
        shell: bash
        run: |
          mkdir -p artifacts
          if [ -s artifacts/resume.pdf ]; then
            echo "Using repository resume file at artifacts/resume.pdf"
          elif [ -n "${{ secrets.RESUME_B64_PART1 }}" ] && [ -n "${{ secrets.RESUME_B64_PART2 }}" ]; then
            printf "%s%s" "${{ secrets.RESUME_B64_PART1 }}" "${{ secrets.RESUME_B64_PART2 }}" | base64 --decode > artifacts/resume.pdf
            echo "Reconstructed resume.pdf from split secrets"
          elif [ -n "${{ secrets.RESUME_B64 }}" ]; then
            printf "%s" "${{ secrets.RESUME_B64 }}" | base64 --decode > artifacts/resume.pdf
            echo "Reconstructed resume.pdf from RESUME_B64 secret"
          else
            echo "Resume source missing. Add artifacts/resume.pdf or secrets RESUME_B64_PART1/RESUME_B64_PART2 (or RESUME_B64)."
            exit 1
          fi

          if [ ! -s artifacts/resume.pdf ]; then
            echo "Resume file was not created correctly"
            exit 1
          fi

          echo "RESUME_PATH=$(pwd)/artifacts/resume.pdf" >> "$GITHUB_ENV"

      - name: Run Cucumber scenario
        run: npx cucumber-js --tags "@naukri and @resume"

      - name: Generate HTML report
        if: always()
        run: npm run report:generate

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: naukri-bdd-report-self-hosted
          path: |
            reports/cucumber-html-report/**
            reports/screenshots/**
            reports/logs/**
